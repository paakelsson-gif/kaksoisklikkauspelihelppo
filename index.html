<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Kaksoisklikkaus – Ohjattu harjoitus</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    background: #eef7ff;
  }

  #instruction {
    font-size: 28px;
    margin-bottom: 30px;
    background: white;
    padding: 15px 25px;
    border-radius: 15px;
  }

  #score {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 20px;
    background: white;
    padding: 10px;
    border-radius: 10px;
  }

  .ball {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background-color: #7ec8ff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s;
  }

  .ball:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

<div id="score">Pisteet: 0</div>
<div id="instruction">👉 Kaksoisklikkaa palloa</div>

<div id="gameArea"></div>

<script>
let score = 0;
const gameArea = document.getElementById("gameArea");

function updateScore() {
  document.getElementById("score").textContent = "Pisteet: " + score;
}

function showBall() {
  gameArea.innerHTML = "";

  const ball = document.createElement("div");
  ball.classList.add("ball");

  const emojis = ["🐶","🐱","🐸","🐼","🦊","🐵"];
  ball.textContent = emojis[Math.floor(Math.random() * emojis.length)];

  ball.ondblclick = () => {
    score++;
    updateScore();

    document.getElementById("instruction").textContent = "🎉 Hienoa!";

    ball.remove();

    // pieni tauko ennen seuraavaa
    setTimeout(() => {
      document.getElementById("instruction").textContent = "👉 Kaksoisklikkaa palloa";
      showBall();
    }, 1000);
  };

  gameArea.appendChild(ball);
}

// käynnistys
showBall();
</script>

</body>
</html>
